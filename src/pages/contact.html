<head>

<body tabindex="0">
<!-- include:navbar.html -->

<section class="container mx-auto px-6 py-12 lg:py-16">
  <div class="mx-auto max-w-4xl card bg-base-100 shadow-xl">
    <div class="card-body">
      <h1 class="card-title text-3xl">Request an Initial Assessment</h1>
      <p class="text-base-content/70">Share your project details and we will follow up within 1 business day.</p>

      <form class="grid gap-4 md:grid-cols-2" action="https://formspree.io/f/xgejqdlo" method="POST">
        <label class="form-control">
          <span class="label-text">Name</span>
          <input class="input input-bordered" type="text" name="name" required>
        </label>

        <label class="form-control">
          <span class="label-text">Email</span>
          <input class="input input-bordered" type="email" name="email" required>
        </label>

        <label class="form-control">
          <span class="label-text">Company</span>
          <input class="input input-bordered" type="text" name="company" required>
        </label>

        <label class="form-control">
          <span class="label-text">Country</span>
          <input class="input input-bordered" type="text" name="country" placeholder="United States" required>
        </label>

        <label class="form-control">
          <span class="label-text">Project Type</span>
          <select class="select select-bordered" name="project_type" required>
            <option value="" disabled selected>Select project type</option>
            <option value="onestream">OneStream</option>
            <option value="fpa">FP&A</option>
            <option value="process_optimization">Process Optimization</option>
            <option value="other">Other</option>
          </select>
        </label>

        <label class="form-control">
          <span class="label-text">Budget Range</span>
          <select class="select select-bordered" name="budget_range" required>
            <option value="" disabled selected>Select budget range</option>
            <option value="under_50k">Under $50,000</option>
            <option value="50k_100k">$50,000 - $100,000</option>
            <option value="100k_250k">$100,000 - $250,000</option>
            <option value="250k_plus">$250,000+</option>
          </select>
        </label>

        <label class="form-control md:col-span-2">
          <span class="label-text">Timeline</span>
          <select class="select select-bordered" name="timeline" required>
            <option value="" disabled selected>Select timeline</option>
            <option value="immediate">Immediate</option>
            <option value="1_3_months">1-3 months</option>
            <option value="3_6_months">3-6 months</option>
            <option value="6_plus_months">6+ months</option>
          </select>
        </label>

        <label class="form-control md:col-span-2">
          <span class="label-text">Message</span>
          <textarea class="textarea textarea-bordered h-32" name="message" placeholder="Tell us about your current platform, goals, and timeline." required></textarea>
        </label>

        <div class="md:col-span-2 flex flex-wrap items-center gap-3">
          <button class="btn btn-primary" type="submit">Submit Proposal Request</button>
          <span class="text-sm text-base-content/70">Direct email: grant@fullclearsolutions.com</span>
        </div>
      </form>
    </div>
  </div>
</section>

<!-- include:footer.html -->
</body>
</html>
